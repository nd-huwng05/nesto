      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/bookings/bookings/today/:
    get:
      operationId: v1_bookings_bookings_today_retrieve
      tags:
