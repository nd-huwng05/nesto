      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/bookings/bookings/upcoming/:
    get:
      operationId: v1_bookings_bookings_upcoming_list
      summary: List upcoming bookings
      tags:
      - Bookings
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/business/branches/:
    get:
      operationId: catalog_branches_list
      description: Compatibility endpoint for FE booking flow.
      summary: List branches (compat)
      tags:
      - Catalog
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Branch'
          description: ''
  /api/v1/business/branches/{branch_id}/:
    get:
      operationId: catalog_branch_detail
      summary: Get branch detail (compat)
      parameters:
      - in: path
        name: branch_id
        schema:
          type: string
        required: true
      tags:
      - Catalog
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Branch'
          description: ''
  /api/v1/customers/hotels/{hotel_slug}/rating-stats:
    get:
      operationId: v1_customers_hotels_rating_stats_retrieve
      description: Return average rating and review count for a hotel. Name can come
        from hotel_slug path or hotel_name query param.
      summary: Get hotel rating statistics
      parameters:
      - in: query
        name: hotel_name
        schema:
          type: string
        description: Optional explicit hotel name override
      - in: path
        name: hotel_slug
        schema:
          type: string
        required: true
      tags:
      - Customers
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerHotelRatingStatsResponse'
              examples:
                HotelRatingStatsResponse:
                  value:
                    hotel_name: Swiss Hotel
                    avg_rating: 4.7
                    review_count: 123
                  summary: Hotel rating stats response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerErrorResponse'
          description: hotel name is required.
  /api/v1/customers/me/booking-snapshots:
    get:
      operationId: v1_customers_me_booking_snapshots_retrieve
      description: Return booking snapshots of the authenticated customer, optionally
        filtered by snapshot type and booking code.
      summary: List my booking snapshots
      parameters:
      - in: query
        name: booking_code
        schema:
          type: string
        description: Filter by booking code
      - in: query
        name: snapshot_type
        schema:
          type: string
          enum:
          - history
          - payment
          - upcoming
        description: Filter by type
      tags:
      - Customers
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerBookingSnapshotListResponse'
              examples:
                BookingSnapshotsResponse:
                  value:
                    results:
                    - snapshot_id: SNAP_20260528_001
                      booking_code: BK862345
                      snapshot_type: upcoming
                      hotel_name: Swiss Hotel
                      room_name: Standard Room 01
                      check_in_date: '2026-06-01'
                      check_out_date: '2026-06-02'
                      payment_status: partial
                      total_amount: '120.00'
                      paid_amount: '50.00'
                      remaining_amount: '70.00'
                      source: mobile-app
                  summary: Booking snapshots response
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerErrorResponse'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Authentication credentials were not provided.
    post:
      operationId: v1_customers_me_booking_snapshots_create
      description: Create a new booking snapshot for the authenticated customer.
      summary: Create a booking snapshot
      tags:
      - Customers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerBookingSnapshotInputRequest'
            examples:
              CreateBookingSnapshotPayload:
                value:
                  snapshot_id: SNAP_20260528_001
                  booking_code: BK862345
                  snapshot_type: upcoming
                  hotel_name: Swiss Hotel
                  room_name: Standard Room 01
                  check_in_date: '2026-06-01'
                  check_out_date: '2026-06-02'
                  payment_status: partial
                  total_amount: '120.00'
                  paid_amount: '50.00'
                  remaining_amount: '70.00'
                  source: mobile-app
                summary: Create booking snapshot payload
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomerBookingSnapshotInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomerBookingSnapshotInputRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerBookingSnapshot'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    errors:
                      snapshot_id:
                      - snapshot_id already exists.
                  summary: Validation error
          description: Invalid request payload.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerErrorResponse'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Authentication credentials were not provided.
  /api/v1/customers/me/booking-snapshots/{snapshot_id}:
    put:
      operationId: v1_customers_me_booking_snapshots_update
      description: Fully update an existing booking snapshot by snapshot_id for the
        authenticated customer.
      summary: Replace a booking snapshot
      parameters:
      - in: path
        name: snapshot_id
        schema:
          type: string
        required: true
      tags:
      - Customers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerBookingSnapshotInputRequest'
            examples:
              ReplaceBookingSnapshotPayload:
                value:
                  snapshot_id: SNAP_20260528_001
                  booking_code: BK862345
                  snapshot_type: upcoming
                  hotel_name: Swiss Hotel
                  room_name: Standard Room 01
                  check_in_date: '2026-06-01'
                  check_out_date: '2026-06-02'
                  payment_status: partial
                  total_amount: '120.00'
                  paid_amount: '50.00'
                  remaining_amount: '70.00'
                  source: mobile-app
                summary: Replace booking snapshot payload
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomerBookingSnapshotInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomerBookingSnapshotInputRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerBookingSnapshot'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    errors:
                      snapshot_id:
                      - snapshot_id already exists.
                  summary: Validation error
          description: Invalid request payload.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerErrorResponse'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Authentication credentials were not provided.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerErrorResponse'
              examples:
                NotFound:
                  value:
                    detail: Snapshot not found.
                  summary: Not found
          description: Snapshot not found.
    patch:
      operationId: v1_customers_me_booking_snapshots_partial_update
      description: Partially update an existing booking snapshot by snapshot_id for
        the authenticated customer.
      summary: Partially update a booking snapshot
      parameters:
      - in: path
        name: snapshot_id
        schema:
          type: string
        required: true
      tags:
      - Customers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCustomerBookingSnapshotInputRequest'
            examples:
              PartialBookingSnapshotPayload:
                value:
                  payment_status: paid
                  paid_amount: '120.00'
                  remaining_amount: '0.00'
                summary: Partial booking snapshot payload
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCustomerBookingSnapshotInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCustomerBookingSnapshotInputRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerBookingSnapshot'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerValidationErrorResponse'
              examples:
                ValidationError:
                  value:
                    errors:
                      snapshot_id:
                      - snapshot_id already exists.
                  summary: Validation error
          description: Invalid request payload.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerErrorResponse'
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
          description: Authentication credentials were not provided.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerErrorResponse'
              examples:
                NotFound:
                  value:
                    detail: Snapshot not found.
                  summary: Not found
          description: Snapshot not found.
  /api/v1/customers/me/hotel-ratings:
    get:
      operationId: v1_customers_me_hotel_ratings_retrieve
      description: Return hotel ratings of the authenticated customer.
      summary: List my hotel ratings
      tags:
      - Customers
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerHotelRatingListResponse'
