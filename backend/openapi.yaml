openapi: 3.0.3
info:
  title: Nesto API
  version: 1.0.0
  description: Hotel Management System API - Backend for Business, Staff, and Customer
    Operations
paths:
  /api/v1/accounts/auth/forgot_password/:
    post:
      operationId: v1_accounts_auth_forgot_password_create
      summary: Request password reset
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Password reset email sent.
        '400':
          description: Invalid request payload.
  /api/v1/accounts/auth/register/:
    post:
      operationId: v1_accounts_auth_register_create
      summary: Register user account
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - {}
      responses:
        '201':
          description: Registration successful.
        '400':
          description: Invalid request payload.
  /api/v1/accounts/auth/reset_password/:
    post:
      operationId: v1_accounts_auth_reset_password_create
      summary: Reset password
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Password reset successful.
        '400':
          description: Invalid token, uid, or payload.
  /api/v1/accounts/auth/send_otp/:
    post:
      operationId: v1_accounts_auth_send_otp_create
      summary: Send OTP for registration
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendOTPRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendOTPRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: OTP sent successfully.
        '400':
          description: Invalid request payload.
  /api/v1/accounts/auth/verify_otp/:
    post:
      operationId: v1_accounts_auth_verify_otp_create
      summary: Verify OTP code
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyOTPRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyOTPRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: OTP verified successfully.
        '400':
          description: Invalid or expired OTP code.
  /api/v1/accounts/users/me/:
    get:
      operationId: v1_accounts_users_me_retrieve
      summary: Get or update current user profile
      tags:
      - Users
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '401':
          description: Authentication credentials were not provided.
    patch:
      operationId: v1_accounts_users_me_partial_update
      summary: Get or update current user profile
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '401':
          description: Authentication credentials were not provided.
  /api/v1/bookings/bookings/:
    get:
      operationId: v1_bookings_bookings_list
      description: List bookings with optional filters by customer, status, date,
        and branch.
      summary: List bookings
      parameters:
      - in: query
        name: branch
        schema:
          type: string
        description: Branch filter (mapped to hotel_name contains)
      - in: query
        name: customer
        schema:
          type: string
        description: Customer user id
      - in: query
        name: date
        schema:
          type: string
          format: date
        description: Filter bookings active on date
      - in: query
        name: status
        schema:
          type: string
        description: Booking status filter
      tags:
      - Bookings
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
          description: ''
    post:
      operationId: v1_bookings_bookings_create
      description: Create a booking from customer or reception payload.
      summary: Create booking
      tags:
      - Bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingCreateRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
        '400':
          description: Invalid request payload.
  /api/v1/bookings/bookings/{booking_ref}/:
    get:
      operationId: v1_bookings_bookings_retrieve
      summary: Get booking detail
      parameters:
      - in: path
        name: booking_ref
        schema:
          type: string
        required: true
      tags:
      - Bookings
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
        '404':
          description: Booking not found.
  /api/v1/bookings/bookings/{booking_ref}/add_service/:
    post:
      operationId: v1_bookings_bookings_add_service_create
      description: Compatibility endpoint for FE. Accepts service_id and quantity
        and returns acceptance payload.
      summary: Add service to booking (compat)
      parameters:
      - in: path
        name: booking_ref
        schema:
          type: string
        required: true
      tags:
      - Bookings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                AddServiceResponse:
                  value:
                    booking_id: BK-000001
                    service_id: airport_shuttle
                    quantity: 1
                    detail: Service line accepted.
                  summary: Add service response
          description: ''
        '404':
          description: Booking not found.
  /api/v1/bookings/bookings/{booking_ref}/cancel/:
    post:
      operationId: v1_bookings_bookings_cancel_create
      parameters:
      - in: path
        name: booking_ref
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/bookings/bookings/{booking_ref}/check_in/:
    post:
      operationId: v1_bookings_bookings_check_in_create
      parameters:
      - in: path
        name: booking_ref
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      security:
