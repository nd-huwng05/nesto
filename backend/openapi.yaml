      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/bookings/bookings/confirm/{booking_ref}/confirm/:
    post:
      operationId: v1_bookings_bookings_confirm_confirm_create
      parameters:
      - in: path
        name: booking_ref
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
          multipart/form-data:
            schema:
