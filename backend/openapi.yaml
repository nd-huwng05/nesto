          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/bookings/bookings/calendar/:
    get:
      operationId: v1_bookings_bookings_calendar_retrieve
      tags:
      - v1
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/bookings/bookings/cancel/{booking_ref}/cancel/:
    post:
      operationId: v1_bookings_bookings_cancel_cancel_create
      parameters:
      - in: path
        name: booking_ref
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/bookings/bookings/check_in/{booking_ref}/check_in/:
    post:
      operationId: v1_bookings_bookings_check_in_check_in_create
      parameters:
      - in: path
        name: booking_ref
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/bookings/bookings/check_out/{booking_ref}/check_out/:
    post:
      operationId: v1_bookings_bookings_check_out_check_out_create
      parameters:
      - in: path
        name: booking_ref
        schema:
          type: string
        required: true
      tags:
